name: Probar instalación simulada en Ubuntu

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  simulated-install:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04

    steps:
      - name: Instalar herramientas base del contenedor
        run: |
          apt-get update
          apt-get install -y bash coreutils grep sed gawk findutils passwd openssl util-linux rsyslog

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución a los scripts
        run: |
          chmod +x scripts/setup_syslog_server_v5.sh
          chmod +x scripts/setup_syslog_client_v5.sh

      - name: Crear usuario y grupo esperados por rsyslog
        run: |
          getent group adm >/dev/null 2>&1 || groupadd adm
          id -u syslog >/dev/null 2>&1 || useradd -r -g adm syslog

      - name: Crear entorno de comandos simulados
        run: |
          mkdir -p /mockbin

          cat > /mockbin/apt-get <<'EOF'
          #!/usr/bin/env bash
          echo "[MOCK apt-get] $@"
          exit 0
          EOF

          cat > /mockbin/systemctl <<'EOF'
          #!/usr/bin/env bash
          echo "[MOCK systemctl] $@"
          if [ "$1" = "is-active" ]; then
            echo "active"
          fi
          exit 0
          EOF

          cat > /mockbin/ufw <<'EOF'
          #!/usr/bin/env bash
          echo "[MOCK ufw] $@" >> "${UFW_MOCK_LOG:-/tmp/ufw_mock_calls}"
          echo "[MOCK ufw] $@"

          if [ "$1" = "status" ]; then
            if [ "${UFW_MOCK_OLD_SYSLOG_RULES:-false}" = "true" ] && [ "${2:-}" = "numbered" ]; then
              echo "Status: active"
              echo "     To                         Action      From"
              echo "[ 1] 10514/udp                  ALLOW IN    172.16.3.3"
              echo "[ 2] 10514/udp                  DENY IN     Anywhere"
              echo "[ 3] 22/tcp                     ALLOW IN    Anywhere"
              echo "[ 4] 6514/tcp                   ALLOW IN    172.16.3.99"
            else
              echo "Status: active"
              echo "To                         Action      From"
              echo "10514/tcp                  DENY        Anywhere"
              echo "10514/udp                  DENY        Anywhere"
              echo "5514/udp                   DENY        Anywhere"
              echo "6514/tcp                   DENY        Anywhere"
            fi
          fi

          exit 0
          EOF

          cat > /mockbin/rsyslogd <<'EOF'
          #!/usr/bin/env bash
          echo "[MOCK rsyslogd] $@"
          exit 0
          EOF

          cat > /mockbin/ss <<'EOF'
          #!/usr/bin/env bash
          echo "[MOCK ss] $@"
          echo "udp UNCONN 0 0 *:10514 *:* users:(('rsyslogd',pid=123,fd=4))"
          echo "udp UNCONN 0 0 *:5514 *:* users:(('rsyslogd',pid=123,fd=8))"
          echo "tcp LISTEN 0 128 *:10514 *:* users:(('rsyslogd',pid=123,fd=5))"
          echo "tcp LISTEN 0 128 *:6514 *:* users:(('rsyslogd',pid=123,fd=6))"
          exit 0
          EOF

          cat > /mockbin/logger <<'EOF'
          #!/usr/bin/env bash
          echo "[MOCK logger] $@"
          exit 0
          EOF

          chmod +x /mockbin/*

      - name: Ejecutar pruebas del servidor en modo basic por defecto
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_server_v5.sh basic \
            --allowed-ips 172.16.3.3,172.16.3.11 \
            --run-test

          test -d /var/log/remote
          test -f /etc/rsyslog.d/10-remote.conf
          test -f /etc/logrotate.d/syslog-remote
          test -f /root/syslog_server_report.txt

          grep -q 'module(load="imudp")' /etc/rsyslog.d/10-remote.conf
          grep -q 'ruleset(name="remote_store")' /etc/rsyslog.d/10-remote.conf
          grep -q 'input(type="imudp" port="10514" ruleset="remote_store")' /etc/rsyslog.d/10-remote.conf
          grep -q 'DynaFile="RemoteLogs"' /etc/rsyslog.d/10-remote.conf
          grep -q '%FROMHOST-IP:::secpath-replace%' /etc/rsyslog.d/10-remote.conf
          grep -q '%PROGRAMNAME:::secpath-replace%' /etc/rsyslog.d/10-remote.conf
          grep -q 'unknown-program.log' /etc/rsyslog.d/10-remote.conf
          grep -q 'if ($programname == "") then {' /etc/rsyslog.d/10-remote.conf

      - name: Validar fallback unknown-program.log con rsyslog real
        run: |
          mkdir -p /tmp/rsyslog-test-work
          rm -f /tmp/rsyslog-fallback-input.log /tmp/rsyslog-fallback-test.conf /tmp/rsyslog-fallback-test.pid
          find /var/log/remote -type f -name '*.log' -delete || true

          {
            echo 'global(workDirectory="/tmp/rsyslog-test-work")'
            echo 'module(load="imfile")'
            sed '/^module(load="imudp")$/d; /^module(load="imtcp")$/d; /^input(type="imudp"/d; /^input(type="imtcp"/d' /etc/rsyslog.d/10-remote.conf
            echo 'input(type="imfile" File="/tmp/rsyslog-fallback-input.log" Tag="/app/test[123]:" Ruleset="remote_store" Severity="info" Facility="local0")'
          } > /tmp/rsyslog-fallback-test.conf

          /usr/sbin/rsyslogd -N1 -f /tmp/rsyslog-fallback-test.conf

          /usr/sbin/rsyslogd -n -i /tmp/rsyslog-fallback-test.pid -f /tmp/rsyslog-fallback-test.conf &
          RSYSLOG_TEST_PID=$!
          trap 'kill "${RSYSLOG_TEST_PID}" 2>/dev/null || true; wait "${RSYSLOG_TEST_PID}" 2>/dev/null || true' EXIT

          sleep 1
          printf '%s\n' 'MENSAJE_SIN_PROGRAMNAME' >> /tmp/rsyslog-fallback-input.log

          for _ in $(seq 1 10); do
            UNKNOWN_FILE="$(find /var/log/remote -type f -name 'unknown-program.log' -print -quit)"
            if [ -n "${UNKNOWN_FILE}" ]; then
              break
            fi
            sleep 1
          done

          UNKNOWN_FILE="$(find /var/log/remote -type f -name 'unknown-program.log' -print -quit)"
          test -n "${UNKNOWN_FILE}"
          test -z "$(find /var/log/remote -type f -name '.log' -print -quit)"
          grep -q 'MENSAJE_SIN_PROGRAMNAME' "${UNKNOWN_FILE}"

      - name: Ejecutar pruebas del servidor en modo basic por TCP
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_server_v5.sh basic \
            --allowed-ips 172.16.3.3 \
            --protocol tcp \
            --run-test

          test -f /etc/rsyslog.d/10-remote.conf
          grep -q 'module(load="imtcp")' /etc/rsyslog.d/10-remote.conf
          grep -q 'input(type="imtcp" port="10514" ruleset="remote_store")' /etc/rsyslog.d/10-remote.conf

      - name: Ejecutar pruebas del servidor en modo basic con ambos protocolos y mismo puerto
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_server_v5.sh basic \
            --allowed-ips 172.16.3.3 \
            --protocol both \
            --port 10514 \
            --run-test

          test -f /etc/rsyslog.d/10-remote.conf
          grep -q 'module(load="imudp")' /etc/rsyslog.d/10-remote.conf
          grep -q 'module(load="imtcp")' /etc/rsyslog.d/10-remote.conf
          grep -q 'input(type="imudp" port="10514" ruleset="remote_store")' /etc/rsyslog.d/10-remote.conf
          grep -q 'input(type="imtcp" port="10514" ruleset="remote_store")' /etc/rsyslog.d/10-remote.conf

      - name: Ejecutar pruebas del servidor en modo basic con ambos protocolos y puertos distintos
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_server_v5.sh basic \
            --allowed-ips 172.16.3.3 \
            --protocol both \
            --tcp-port 10514 \
            --udp-port 5514 \
            --run-test

          test -f /etc/rsyslog.d/10-remote.conf
          grep -q 'module(load="imudp")' /etc/rsyslog.d/10-remote.conf
          grep -q 'module(load="imtcp")' /etc/rsyslog.d/10-remote.conf
          grep -q 'input(type="imudp" port="5514" ruleset="remote_store")' /etc/rsyslog.d/10-remote.conf
          grep -q 'input(type="imtcp" port="10514" ruleset="remote_store")' /etc/rsyslog.d/10-remote.conf

      - name: Probar reconfiguración del servidor limpiando reglas UFW antiguas
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          UFW_MOCK_OLD_SYSLOG_RULES: "true"
        run: |
          : > /tmp/ufw_mock_calls

          printf '%s\n' \
            '# Configuración basic previa de recepción syslog.' \
            'module(load="imudp")' \
            'input(type="imudp" port="10514" ruleset="remote_store")' \
            > /etc/rsyslog.d/10-remote.conf

          printf 'y\n' | bash scripts/setup_syslog_server_v5.sh basic \
            --allowed-ips 172.16.3.11 \
            --protocol udp \
            --port 10514 \
            > /tmp/reconfig_ufw_cleanup_output

          grep -q 'Se van a eliminar reglas UFW antiguas relacionadas con este servicio syslog' /tmp/reconfig_ufw_cleanup_output
          grep -q '¿Deseas continuar? \[y/N\]' /tmp/reconfig_ufw_cleanup_output
          grep -q '\[MOCK ufw\] --force delete 1' /tmp/ufw_mock_calls
          ! grep -q '\[MOCK ufw\] --force delete 2' /tmp/ufw_mock_calls
          ! grep -q '\[MOCK ufw\] --force delete 3' /tmp/ufw_mock_calls
          ! grep -q '\[MOCK ufw\] --force delete 4' /tmp/ufw_mock_calls
          grep -q '\[MOCK ufw\] insert 2 allow from 172.16.3.11 to any port 10514 proto udp comment syslog-server-v5' /tmp/ufw_mock_calls

      - name: Ejecutar pruebas del servidor en modo tls
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_server_v5.sh tls \
            --allowed-ips 172.16.3.3 \
            --port 6514 \
            --server-name syslog.local \
            --server-ip 172.16.3.2 \
            --server-sans syslog01.empresa.local,logs.local \
            --tls-clients kali01,ubuntu01 \
            --run-test

          test -f /etc/rsyslog.d/10-tls.conf
          test -f /etc/rsyslog-certs/ca.crt
          test -f /etc/rsyslog-certs/server.crt
          test -f /etc/rsyslog-certs/kali01.crt
          test -f /etc/rsyslog-certs/ubuntu01.crt
          test -f /root/syslog-client-bundles/kali01/client.crt
          test -f /root/syslog-client-bundles/ubuntu01/client.crt
          grep -q 'module(load="gtls")' /etc/rsyslog.d/10-tls.conf
          grep -q 'StreamDriverAuthMode="x509/name"' /etc/rsyslog.d/10-tls.conf
          grep -q 'PermittedPeer=' /etc/rsyslog.d/10-tls.conf
          grep -q '%FROMHOST-IP:::secpath-replace%' /etc/rsyslog.d/10-tls.conf
          grep -q '%PROGRAMNAME:::secpath-replace%' /etc/rsyslog.d/10-tls.conf
          grep -q 'unknown-program.log' /etc/rsyslog.d/10-tls.conf

      - name: Comprobar contenido SAN de extensiones OpenSSL generadas
        run: |
          test -f /etc/rsyslog-certs/server_ext.cnf
          grep -q 'DNS.1=syslog.local' /etc/rsyslog-certs/server_ext.cnf
          grep -q 'IP.1=172.16.3.2' /etc/rsyslog-certs/server_ext.cnf

          test -f /etc/rsyslog-certs/kali01_ext.cnf
          grep -q 'extendedKeyUsage=clientAuth' /etc/rsyslog-certs/kali01_ext.cnf

      - name: Ejecutar pruebas del cliente en modo basic por defecto
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_client_v5.sh basic \
            --server 172.16.3.2 \
            --run-test

          test -f /etc/rsyslog.d/20-forward.conf
          test -f /root/syslog_client_report.txt
          grep -q '@172.16.3.2:10514' /etc/rsyslog.d/20-forward.conf

      - name: Ejecutar pruebas del cliente en modo basic por TCP
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_client_v5.sh basic \
            --server 172.16.3.2 \
            --protocol tcp \
            --run-test

          test -f /etc/rsyslog.d/20-forward.conf
          grep -q '@@172.16.3.2:10514' /etc/rsyslog.d/20-forward.conf

      - name: Ejecutar pruebas del cliente en modo basic por UDP con puerto personalizado
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_client_v5.sh basic \
            --server 172.16.3.2 \
            --protocol udp \
            --port 5514 \
            --run-test

          test -f /etc/rsyslog.d/20-forward.conf
          grep -q '@172.16.3.2:5514' /etc/rsyslog.d/20-forward.conf

      - name: Preparar certificados ficticios para prueba cliente TLS
        run: |
          mkdir -p /tmp/client-test
          printf '%s\n' 'FAKE-CA' > /tmp/client-test/ca.crt
          printf '%s\n' 'FAKE-CLIENT-CERT' > /tmp/client-test/client.crt
          printf '%s\n' 'FAKE-CLIENT-KEY' > /tmp/client-test/client.key

      - name: Ejecutar pruebas del cliente en modo tls
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_client_v5.sh tls \
            --server 172.16.3.2 \
            --port 6514 \
            --ca /tmp/client-test/ca.crt \
            --cert /tmp/client-test/client.crt \
            --key /tmp/client-test/client.key \
            --peer syslog.local \
            --run-test

          test -f /etc/rsyslog.d/20-tls.conf
          test -f /etc/rsyslog-certs/ca.crt
          test -f /etc/rsyslog-certs/client.crt
          test -f /etc/rsyslog-certs/client.key
          grep -q 'module(load="gtls")' /etc/rsyslog.d/20-tls.conf
          grep -q 'StreamDriverPermittedPeers=\["syslog.local"\]' /etc/rsyslog.d/20-tls.conf

      - name: Ejecutar pruebas del cliente en modo tls con puerto personalizado
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_client_v5.sh tls \
            --server 172.16.3.2 \
            --port 6515 \
            --ca /tmp/client-test/ca.crt \
            --cert /tmp/client-test/client.crt \
            --key /tmp/client-test/client.key \
            --peer syslog.local \
            --run-test

          test -f /etc/rsyslog.d/20-tls.conf
          grep -q 'port="6515"' /etc/rsyslog.d/20-tls.conf
          grep -q 'StreamDriverPermittedPeers=\["syslog.local"\]' /etc/rsyslog.d/20-tls.conf

      - name: Ejecutar pruebas del cliente en modo disable
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_client_v5.sh disable

          test ! -f /etc/rsyslog.d/20-forward.conf
          test ! -f /etc/rsyslog.d/20-tls.conf

      - name: Probar regeneración de certificados en el servidor
        env:
          PATH: /mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          bash scripts/setup_syslog_server_v5.sh tls \
            --allowed-ips 172.16.3.3 \
            --port 6514 \
            --server-name syslog.local \
            --server-ip 172.16.3.2 \
            --tls-clients kali01 \
            --regenerate-certs

          test -f /etc/rsyslog-certs/ca.crt
          test -f /etc/rsyslog-certs/server.crt
          test -f /etc/rsyslog-certs/kali01.crt

      - name: Mostrar resumen de archivos generados
        run: |
          echo "=== /etc/rsyslog.d ==="
          ls -la /etc/rsyslog.d || true
          echo
          echo "=== /etc/rsyslog-certs ==="
          ls -la /etc/rsyslog-certs || true
          echo
          echo "=== /root/syslog-client-bundles ==="
          find /root/syslog-client-bundles -maxdepth 3 -type f | sort || true
